<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelas Online (Zoom Sederhana)</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
    text-align:center;
}

header{
    background:#1e293b;
    padding:15px;
    font-size:20px;
}

input{
    padding:10px;
    width:200px;
    border-radius:8px;
    border:none;
    margin:10px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.host{background:#22c55e;color:white;}
.viewer{background:#3b82f6;color:white;}

video{
    width:60%;
    max-width:700px;
    margin-top:15px;
    border-radius:12px;
    background:black;
}
</style>
</head>

<body>

<header>🎓 Kelas Online - Share Layar Guru</header>

<div>

    <input id="room" placeholder="Kode kelas (contoh: kelas1)">

    <br>

    <button class="host" onclick="startHost()">Guru (Host)</button>
    <button class="viewer" onclick="startViewer()">Siswa (Viewer)</button>

    <br>

    <video id="video" autoplay playsinline></video>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let pc;
let stream;
let room;

// ===== CREATE PEER =====
function createPeer(){
    pc = new RTCPeerConnection({
        iceServers:[{urls:"stun:stun.l.google.com:19302"}]
    });

    pc.ontrack = e=>{
        document.getElementById("video").srcObject = e.streams[0];
    };

    pc.onicecandidate = e=>{
        if(e.candidate){
            socket.emit("candidate",{
                room,
                candidate:e.candidate
            });
        }
    };
}

// ===== HOST (GURU) =====
async function startHost(){
    room = document.getElementById("room").value;
    if(!room) return alert("Isi kode kelas!");

    socket.emit("join-room", room);
    socket.emit("set-role","host");

    createPeer();

    // SHARE SCREEN
    stream = await navigator.mediaDevices.getDisplayMedia({
        video:true,
        audio:false
    });

    document.getElementById("video").srcObject = stream;

    stream.getTracks().forEach(track=>{
        pc.addTrack(track, stream);
    });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("offer",{
        room,
        offer
    });
}

// ===== VIEWER (SISWA) =====
function startViewer(){
    room = document.getElementById("room").value;
    if(!room) return alert("Isi kode kelas!");

    socket.emit("join-room", room);
    socket.emit("set-role","viewer");

    createPeer();
}

// ===== RECEIVE OFFER =====
socket.on("offer", async data=>{
    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));

    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);

    socket.emit("answer",{
        room,
        answer
    });
});

// ===== RECEIVE ANSWER =====
socket.on("answer", async data=>{
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
});

// ===== ICE CANDIDATE =====
socket.on("candidate", async data=>{
    if(data.candidate){
        await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
});
</script>

</body>
</html>
